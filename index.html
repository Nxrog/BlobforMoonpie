<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Classroom</title>
  <link rel="icon" type="image/x-icon" href="./favicongoogle.png">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    button {
      padding: 1em 2em;
      font-size: 1.2em;
      border-radius: 8px;
      border: 2px solid #fff;
      background: #111;
      color: #fff;
      cursor: pointer;
      margin-top: 2em;
      transition: background 0.2s, color 0.2s;
    }
    button:hover {
      background: #fff;
      color: #111;
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: grayscale(1) contrast(1.2);
      margin-bottom: 1.5em;
      background: #222;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 24px #0008;
    }
    .float-img {
      position: absolute;
      left: 10vw;
      top: 30vh;
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: grayscale(1) contrast(1.2);
      opacity: 0.85;
      animation: floatY 4s ease-in-out infinite alternate, floatX 7s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 10;
    }
    @keyframes floatY {
      0% { transform: translateY(0); }
      100% { transform: translateY(-60px); }
    }
    @keyframes floatX {
      0% { transform: translateX(0); }
      100% { transform: translateX(40px); }
    }
    h1 {
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5em;
    }
  </style>
</head>
<body>
  <img src="MoonPielogo.png" alt="MoonPie Logo" class="logo">
  <img src="./deledao.png" alt="Deledao" class="float-img">
  <h1>MoonPie</h1>
  <button id="launchBtn">Launch</button>
  <script>
    document.getElementById('launchBtn').onclick = async function() {
      try {
        const response = await fetch('https://moonyschooldepartment.pages.dev');
        if (!response.ok) throw new Error('network response was not ok');
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
      } catch (e) {
        alert('Failed to fetch the target page.\n' + e);
      }
    };
  </script>
</body>
</html>
