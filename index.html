<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Classroom</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #181a20; color: #fff; }
    button { padding: 1em 2em; font-size: 1.2em; border-radius: 8px; border: none; background: #6cff00; color: #181a20; cursor: pointer; margin-top: 2em; }
  </style>
</head>
<body>
  <h1>Launch MoonPie</h1>
  <button id="launchBtn">Launch Blob</button>
  <script>
    document.getElementById('launchBtn').onclick = async function() {
      try {
        const response = await fetch('https://moonyschooldepartment.pages.dev');
        if (!response.ok) throw new Error('Network response was not ok');
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
      } catch (e) {
        alert('Failed to fetch the target page.\n' + e);
      }
    };
  </script>
</body>
</html>
