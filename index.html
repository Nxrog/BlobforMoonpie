<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Classroom</title>
  <link rel="icon" type="image/x-icon" href="favicongoogle.png">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .btn-row {
      display: flex;
      gap: 1em;
      margin-top: 2em;
    }
    button {
      padding: 1em 2em;
      font-size: 1.2em;
      border-radius: 8px;
      border: 2px solid #fff;
      background: #111;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button:hover {
      background: #fff;
      color: #111;
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: grayscale(1) contrast(1.2);
      margin-bottom: 1.5em;
      background: #222;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 24px #0008;
    }
    .float-img {
      position: absolute;
      left: 0;
      top: 0;
      width: 220px;
      height: 220px;
      object-fit: contain;
      filter: grayscale(1) contrast(1.2);
      opacity: 0.85;
      pointer-events: none;
      z-index: 10;
      will-change: transform;
    }
    h1 {
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5em;
    }
  </style>
</head>
<body>
  <img src="MoonPielogo.png" alt="MoonPie Logo" class="logo">
  <img src="deledao.png" alt="Deledao" class="float-img" id="bouncingImg">
  <h1>MoonPie</h1>
  <div class="btn-row">
    <button id="blobBtn">Launch (Blob)</button>
    <button id="blankBtn">Launch (Tab)</button>
  </div>
  <script>
    const img = document.getElementById('bouncingImg');
    const imgW = 220, imgH = 220;
    let x = Math.random() * (window.innerWidth - imgW);
    let y = Math.random() * (window.innerHeight - imgH);
    let dx = 3 + Math.random() * 2;
    let dy = 3 + Math.random() * 2;
    function animate() {
      x += dx;
      y += dy;
      if (x <= 0 || x >= window.innerWidth - imgW) {
        dx = -dx;
        x = Math.max(0, Math.min(x, window.innerWidth - imgW));
      }
      if (y <= 0 || y >= window.innerHeight - imgH) {
        dy = -dy;
        y = Math.max(0, Math.min(y, window.innerHeight - imgH));
      }
      img.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      x = Math.max(0, Math.min(x, window.innerWidth - imgW));
      y = Math.max(0, Math.min(y, window.innerHeight - imgH));
    });

    const LAUNCHER_URL = 'https://moonyschooldepartment.pages.dev/MoonPieLauncher/';
    const IFRAME_HTML = `<!DOCTYPE html><html><head><style>*{margin:0;padding:0;overflow:hidden;width:100%;height:100%}</style></head><body><iframe src="${LAUNCHER_URL}" style="border:none;width:100vw;height:100vh;display:block" allowfullscreen></iframe></body></html>`;

    document.getElementById('blobBtn').onclick = function() {
      const blob = new Blob([IFRAME_HTML], { type: 'text/html' });
      const blobUrl = URL.createObjectURL(blob);
      window.open(blobUrl);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
    };

    document.getElementById('blankBtn').onclick = function() {
      const win = window.open('about:blank');
      win.document.open();
      win.document.write(IFRAME_HTML);
      win.document.close();
    };
  </script>
</body>
</html>
